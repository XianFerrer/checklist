<!doctype html>
<html>
  <head>
    <title>ICU Pain Handover Checklist</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #ffffff;
      }

      .page {
        display: flex;
        justify-content: center;
        padding: 30px;
      }

      .card {
        width: 900px;
        background: #ffffff;
        padding: 20px;
        border: 1px solid #888;
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
      }

      h3 {
        margin: 0 0 10px;
        border-bottom: 1px solid #888;
        padding-bottom: 5px;
        color: #000;
      }

      .section {
        border: 1px solid #888;
        padding: 10px;
        margin-bottom: 15px;
      }

      /* top row */
      .row {
        display: flex;
      }

      .field {
        flex: 1;
        padding: 8px;
      }

      label {
        font-size: 13px;
        display: block;
        margin-top: 5px;
      }

      input,
      textarea {
        width: 98%;
        padding: 6px;
        border: 1px solid #888;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        font-size: 13px;
      }

      input:focus,
      textarea:focus {
        outline: none;
      }

      textarea {
        min-height: 60px;
      }

      /* simple checkbox style */
      .section label input {
        width: auto;
        margin-right: 6px;
      }
      @media print {
        body {
          background: white;
        }

        .page {
          padding: 0;
        }

        .card {
          width: 100%;
          border: none;
          box-shadow: none;
        }

        button {
          display: none; /* hide button in PDF */
        }
      }
      /* A4 sizing */
      @page {
        size: A4;
        margin: 12mm;
      }

      @media print {
        body {
          background: white;
        }

        .page {
          padding: 0;
        }

        .card {
          width: 210mm;
          min-height: 297mm;
          background: #ffffff;
          padding: 15mm;
          border: 1px solid #888;
        }

        h2 {
          font-size: 18px;
        }

        h3 {
          font-size: 14px;
        }

        label,
        input,
        textarea {
          font-size: 12px;
        }

        button {
          display: none; /* hide button in PDF */
        }
      }
      .section {
        border: 1px solid #888;
        padding: 8px;
        margin-bottom: 10px;

        page-break-inside: avoid; /* KEY FIX */
        break-inside: avoid; /* modern browsers */
      }
      .page-break {
        page-break-before: always;
        break-before: page;
      }
      @page {
        size: A4;
        margin: 0;
      }

      .print-page {
        width: 210mm;
        margin: auto;
      }

      /* EACH PAGE */
      .print-section {
        width: 210mm;
        height: 297mm;
        padding: 12mm;
        box-sizing: border-box;
        background: white;
        position: relative;
      }

      /* force page break */
      .page2 {
        page-break-before: always;
        break-before: page;
      }
      select {
        width: 100%;
        border: 1px solid #888;
        padding: 4px;
        font-size: 12px;
        background: transparent;
      }
    </style>
  </head>

  <body>
    <div class="page">
      <div class="card">
        <h2>CU Pain Handover Checklist</h2>

        <!-- Top Row -->
        <div class="row">
          <div class="field">
            <label>Patient Name/ID</label>
            <input type="text" />
          </div>

          <div class="field">
            <label>Date/Time</label>
            <input type="datetime-local" />
          </div>

          <div class="field">
            <label>Nurse</label>
            <input type="text" />
          </div>
        </div>

        <!-- 1 -->
        <div class="section">
          <h3>1. Pain Assessment (Current)</h3>

          <label>Pain Score</label>
          <input type="text" />

          <label>Tool Used</label>
          <select>
            <option value="">Select Tool</option>
            <option value="CPOT">CPOT</option>
            <option value="BPS">BPS</option>
          </select>
          <label style="font-weight: bold"
            >Behavioural Indicators Observed:
          </label>
          <label><input type="checkbox" /> Grimacing</label>
          <label><input type="checkbox" /> Ventilator dyssynchrony</label>
          <label><input type="checkbox" /> Restlessness/agitation</label>
          <label><input type="checkbox" /> Muscle tension</label>

          <label>Other</label>
          <input type="text" />
        </div>

        <!-- 2 -->
        <div class="section">
          <h3>2. Pain Trend</h3>

          <label><input type="checkbox" /> Improving</label>
          <label><input type="checkbox" /> Worsening</label>
          <label><input type="checkbox" /> Unchanged</label>

          <label>Notes</label>
          <textarea></textarea>
        </div>

        <!-- 3 -->
        <div class="section">
          <h3>3. Analgesia & Response</h3>

          <label>Last Analgesia</label>
          <input type="text" />

          <label>Time Given</label>
          <input type="time" />

          <label><input type="checkbox" /> Effective</label>
          <label><input type="checkbox" /> Partially Effective</label>
          <label><input type="checkbox" /> Ineffective</label>

          <label>Reassessment Score</label>
          <input type="text" />
        </div>

        <!-- 4 -->
        <div class="section page-break">
          <h3>4. Concerns</h3>

          <label><input type="checkbox" /> Pain not controlled</label>
          <label><input type="checkbox" /> Delirium vs pain unclear</label>
          <label><input type="checkbox" /> Escalating analgesia</label>
          <label><input type="checkbox" /> Side effects</label>
          <label><input type="checkbox" /> No concerns</label>

          <label>Clinical Notes</label>
          <textarea></textarea>
        </div>

        <!-- 5 -->
        <div class="section">
          <h3>5. Plan</h3>

          <label><input type="checkbox" /> Continue current</label>
          <label><input type="checkbox" /> Increase analgesia</label>
          <label><input type="checkbox" /> Review by doctor</label>
          <label><input type="checkbox" /> Alternative agents</label>
          <label><input type="checkbox" /> Monitor closely</label>

          <label>Plan Details</label>
          <textarea></textarea>
        </div>

        <!-- Summary -->
        <div class="section">
          <h3>Handover Summary</h3>
          <textarea></textarea>
        </div>
        <button class="btn" onclick="savePDF()">Save as PDF</button>
      </div>
    </div>
    <script>
      function savePDF() {
        window.print();
      }
    </script>
  </body>
</html>
