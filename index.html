<!DOCTYPE html>
<html>
<head>
  <title>CU Pain Handover Checklist</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    h2 { color: #2c3e50; }
    .section { margin-bottom: 20px; }
    label { display: block; margin: 5px 0; }
    input, textarea { width: 100%; padding: 5px; margin-top: 5px; }
    <style>
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #eef2f7, #dfe9f3);
    margin: 0;
    padding: 20px;
  }

  .container {
    max-width: 720px;
    margin: auto;
    background: #ffffff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #2c3e50;
  }

  h3 {
    color: #34495e;
    border-left: 4px solid #3498db;
    padding-left: 8px;
    margin-top: 20px;
  }

  .section {
    margin-bottom: 20px;
  }

  label {
    font-size: 14px;
    margin-top: 10px;
    display: block;
    color: #555;
  }

  input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
    transition: 0.2s;
  }

  input:focus, textarea:focus {
    border-color: #3498db;
    outline: none;
    box-shadow: 0 0 5px rgba(52,152,219,0.3);
  }

  textarea {
    min-height: 70px;
    resize: vertical;
  }

  .checkbox-group {
    margin-top: 8px;
  }

  .checkbox-group label {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #f8f9fb;
    padding: 8px;
    border-radius: 6px;
    margin-bottom: 5px;
    cursor: pointer;
  }

  .checkbox-group input {
    width: auto;
  }

  .btn {
    margin-top: 20px;
    background: linear-gradient(135deg, #3498db, #2ecc71);
    color: white;
    padding: 12px;
    border: none;
    border-radius: 8px;
    width: 100%;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
  }

  .btn:hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }
</style>
  </style>
</head>
<body>

<h2>CU Pain Handover Checklist</h2>

<div class="section">
  <label>Patient Name/ID:</label>
  <input type="text">
  
  <label>Date/Time:</label>
  <input type="datetime-local">
  
  <label>Nurse:</label>
  <input type="text">
</div>

<div class="section">
  <h3>1. Pain Assessment (Current)</h3>
  <label>Pain Score:</label>
  <input type="text">
  
  <label>Tool Used:</label>
  <input type="text">

  <label><input type="checkbox"> Grimacing</label>
  <label><input type="checkbox"> Ventilator dyssynchrony</label>
  <label><input type="checkbox"> Restlessness/agitation</label>
  <label><input type="checkbox"> Muscle tension</label>
  
  <label>Other:</label>
  <input type="text">
</div>

<div class="section">
  <h3>2. Pain Trend</h3>
  <label><input type="checkbox"> Improving</label>
  <label><input type="checkbox"> Worsening</label>
  <label><input type="checkbox"> Unchanged</label>

  <label>Notes:</label>
  <textarea></textarea>
</div>

<div class="section">
  <h3>3. Analgesia & Response</h3>
  <label>Last Analgesia:</label>
  <input type="text">

  <label>Time Given:</label>
  <input type="time">

  <label><input type="checkbox"> Effective</label>
  <label><input type="checkbox"> Partially Effective</label>
  <label><input type="checkbox"> Ineffective</label>

  <label>Reassessment Score:</label>
  <input type="text">
</div>

<div class="section">
  <h3>4. Concerns</h3>
  <label><input type="checkbox"> Pain not controlled</label>
  <label><input type="checkbox"> Delirium vs pain unclear</label>
  <label><input type="checkbox"> Escalating analgesia</label>
  <label><input type="checkbox"> Side effects</label>
  <label><input type="checkbox"> No concerns</label>

  <label>Clinical Notes:</label>
  <textarea></textarea>
</div>

<div class="section">
  <h3>5. Plan</h3>
  <label><input type="checkbox"> Continue current</label>
  <label><input type="checkbox"> Increase analgesia</label>
  <label><input type="checkbox"> Review by doctor</label>
  <label><input type="checkbox"> Alternative agents</label>
  <label><input type="checkbox"> Monitor closely</label>

  <label>Plan Details:</label>
  <textarea></textarea>
</div>

<div class="section">
  <h3>Handover Summary</h3>
  <textarea></textarea>
</div>

</body>
</html>
